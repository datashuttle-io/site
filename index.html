<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>DataShuttle — Iceberg-Native Ingestion Engine</title>
    <meta name="description" content="Move data from any source into Apache Iceberg with one SQL statement. No Kafka, no Flink, no Spark. Sub-minute latency, Iceberg V3 native." />
    <meta property="og:title" content="DataShuttle — Iceberg-Native Ingestion Engine" />
    <meta property="og:description" content="One SQL statement. Any source. Apache Iceberg." />
    <meta property="og:url" content="https://datashuttle.ai" />
    <meta property="og:type" content="website" />
    <script>
      // Anti-FOUC: respect user's OS color-scheme preference before
      // first paint. The page's CSS has [data-theme="dark"] overrides;
      // this just sets the attribute. No per-user override (yet).
      (function () {
        try {
          var prefersDark = window.matchMedia
            && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = prefersDark ? "dark" : "light";
        } catch (_) {
          document.documentElement.dataset.theme = "light";
        }
      })();
      // Keep in sync if the OS preference flips live.
      try {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
          document.documentElement.dataset.theme = e.matches ? "dark" : "light";
        });
      } catch (_) { /* ignore unsupported */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
