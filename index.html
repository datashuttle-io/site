<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/brand/safari-pinned-tab.svg" color="#1FC3A1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Theme-color tracks the active scheme; set after first paint by the
         FOUC script below so it matches the v3 paper / graphite backgrounds. -->
    <meta name="theme-color" content="#FAFAFB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0C0E" media="(prefers-color-scheme: dark)" />
    <!-- v3 fonts: Inter Tight (UI+display), JetBrains Mono (code+numeric),
         Source Serif 4 (long-form only). Loaded as a parallel stylesheet
         <link> (NOT a CSS @import) so it never blocks first paint; display=swap
         shows fallback text immediately. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" />
    <title>DataShuttle — Iceberg-native ingestion engine</title>
    <meta name="description" content="Move operational data from Postgres, MySQL, MongoDB, and Kafka into Apache Iceberg with one SQL statement. One Rust binary — managed cloud, self-hosted, or airgapped." />
    <meta property="og:title" content="DataShuttle — Iceberg-native ingestion engine" />
    <meta property="og:description" content="Operational data into Apache Iceberg. One SQL statement." />
    <meta property="og:url" content="https://datashuttle.ai" />
    <meta property="og:type" content="website" />
    <script>
      // Anti-FOUC: respect user's OS color-scheme preference before
      // first paint. The page's CSS has [data-theme="dark"] overrides;
      // this just sets the attribute. No per-user override (yet).
      (function () {
        try {
          var prefersDark = window.matchMedia
            && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = prefersDark ? "dark" : "light";
        } catch (_) {
          document.documentElement.dataset.theme = "light";
        }
      })();
      // Keep in sync if the OS preference flips live.
      try {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
          document.documentElement.dataset.theme = e.matches ? "dark" : "light";
        });
      } catch (_) { /* ignore unsupported */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
